<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>午前二時の留守番電話</title>
<meta name="description" content="1997年、古い団地を舞台にしたホラーサウンドノベル「午前二時の留守番電話」">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Old+Mincho:wght@400;600&family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <div id="game-frame">

    <!-- 背景レイヤー群 -->
    <div id="bg-layer"></div>
    <div id="bg-noise"></div>
    <div id="bg-scanlines"></div>
    <div id="bg-vignette"></div>
    <div id="bg-flash"></div>

    <!-- 人物シルエット -->
    <div id="character-layer"></div>

    <!-- ============== タイトル画面 ============== -->
    <div id="title-screen" role="region" aria-label="タイトル画面">
      <div id="title-logo">
        <div class="main">午前二時の留守番電話</div>
        <div class="sub">A.M. 2:00 ANSWERING MACHINE</div>
      </div>
      <nav id="title-menu" aria-label="タイトルメニュー">
        <div class="title-menu-item" data-action="new-game" tabindex="0" role="button" aria-label="はじめから">はじめから</div>
        <div class="title-menu-item" data-action="continue" tabindex="0" role="button" aria-label="つづきから">つづきから</div>
        <div class="title-menu-item" data-action="chapter-select" tabindex="0" role="button" aria-label="章を選ぶ">章を選ぶ</div>
        <div class="title-menu-item" data-action="settings" tabindex="0" role="button" aria-label="設定">設定</div>
        <div class="title-menu-item" data-action="endings" tabindex="0" role="button" aria-label="記録">記録</div>
      </nav>
    </div>

    <!-- ============== エンディングバナー ============== -->
    <div id="ending-banner" role="status">
      <div class="ending-banner-text" id="ending-banner-text"></div>
    </div>

    <!-- ============== 選択肢レイヤー ============== -->
    <div id="choice-layer" role="listbox" aria-label="選択肢"></div>

    <!-- ============== テキストウィンドウ ============== -->
    <div id="text-window" role="region" aria-live="polite">
      <div id="speaker-name"></div>
      <div id="main-text"></div>
      <div id="next-indicator" aria-hidden="true"></div>
    </div>

    <!-- ゲーム中メニューボタン -->
    <button id="menu-toggle-btn" aria-label="メニューを開く"></button>
    <div id="skip-indicator" aria-hidden="true">SKIP</div>

    <!-- ============== サイドメニュー ============== -->
    <div id="menu-overlay"></div>
    <aside id="side-menu" aria-label="ゲームメニュー">
      <div class="side-menu-title">MENU</div>
      <div class="side-menu-item" data-action="save" tabindex="0" role="button">セーブ</div>
      <div class="side-menu-item" data-action="load" tabindex="0" role="button">ロード</div>
      <div class="side-menu-item" data-action="backlog" tabindex="0" role="button">バックログ</div>
      <div class="side-menu-item" data-action="toggle-auto" tabindex="0" role="button" id="auto-toggle-item">オート：OFF</div>
      <div class="side-menu-item" data-action="toggle-skip" tabindex="0" role="button" id="skip-toggle-item">スキップ：OFF</div>
      <div class="side-menu-item" data-action="settings" tabindex="0" role="button">設定</div>
      <div class="side-menu-item" data-action="title" tabindex="0" role="button">タイトルへ戻る</div>
    </aside>

    <!-- ============== セーブ画面 ============== -->
    <div class="panel" id="panel-save" aria-label="セーブ画面">
      <div class="panel-header">
        <div class="panel-title">セーブ</div>
        <div class="panel-close" data-action="close-panel" tabindex="0" role="button" aria-label="閉じる">閉じる</div>
      </div>
      <div class="slot-grid" id="save-slot-grid"></div>
    </div>

    <!-- ============== ロード画面 ============== -->
    <div class="panel" id="panel-load" aria-label="ロード画面">
      <div class="panel-header">
        <div class="panel-title">ロード</div>
        <div class="panel-close" data-action="close-panel" tabindex="0" role="button" aria-label="閉じる">閉じる</div>
      </div>
      <div class="slot-grid" id="load-slot-grid"></div>
    </div>

    <!-- ============== バックログ画面 ============== -->
    <div class="panel" id="panel-backlog" aria-label="バックログ画面">
      <div class="panel-header">
        <div class="panel-title">バックログ</div>
        <div class="panel-close" data-action="close-panel" tabindex="0" role="button" aria-label="閉じる">閉じる</div>
      </div>
      <div id="backlog-list"></div>
    </div>

    <!-- ============== 設定画面 ============== -->
    <div class="panel" id="panel-settings" aria-label="設定画面">
      <div class="panel-header">
        <div class="panel-title">設定</div>
        <div class="panel-close" data-action="close-panel" tabindex="0" role="button" aria-label="閉じる">閉じる</div>
      </div>

      <div class="setting-row">
        <div class="setting-label">文字表示速度</div>
        <div class="setting-control">
          <input type="range" id="setting-text-speed" min="5" max="80" step="5" aria-label="文字表示速度">
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">BGM音量</div>
        <div class="setting-control">
          <input type="range" id="setting-bgm-volume" min="0" max="100" step="5" aria-label="BGM音量">
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">効果音音量</div>
        <div class="setting-control">
          <input type="range" id="setting-se-volume" min="0" max="100" step="5" aria-label="効果音音量">
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">ミュート</div>
        <div class="setting-control">
          <div class="toggle-btn" id="setting-mute-toggle" tabindex="0" role="button" aria-label="ミュート切り替え">OFF</div>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">画面の点滅・揺れ演出</div>
        <div class="setting-control">
          <div class="toggle-btn" id="setting-shake-toggle" tabindex="0" role="button" aria-label="画面揺れ演出の切り替え">ON</div>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">フルスクリーン</div>
        <div class="setting-control">
          <div class="toggle-btn" id="setting-fullscreen-toggle" tabindex="0" role="button" aria-label="フルスクリーン切り替え">OFF</div>
        </div>
      </div>
    </div>

    <!-- ============== エンディング記録画面 ============== -->
    <div class="panel" id="panel-endings" aria-label="エンディング記録画面">
      <div class="panel-header">
        <div class="panel-title">記録 ― エンディング一覧</div>
        <div class="panel-close" data-action="close-panel" tabindex="0" role="button" aria-label="閉じる">閉じる</div>
      </div>
      <div id="ending-list"></div>
    </div>

    <!-- ============== 章選択画面 ============== -->
    <div class="panel" id="panel-chapters" aria-label="章選択画面">
      <div class="panel-header">
        <div class="panel-title">章を選ぶ</div>
        <div class="panel-close" data-action="close-panel" tabindex="0" role="button" aria-label="閉じる">閉じる</div>
      </div>
      <div id="chapter-list"></div>
    </div>

  </div>

  <!-- 横画面推奨オーバーレイ（スマホ縦持ち時、任意で表示） -->
  <div id="rotate-hint">
    <div class="rotate-icon" aria-hidden="true">⟳</div>
    <p>横画面でのプレイを推奨します。<br>このままでも縦画面でプレイできます。</p>
    <button id="rotate-hint-close" aria-label="このまま続ける">このまま続ける</button>
  </div>
</div>

<script src="scenario.js"></script>
<script src="backgrounds.js"></script>
<script src="audio.js"></script>
<script src="save.js"></script>
<script src="engine.js"></script>
</body>
</html>
